<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 700px; height: 400px; background: #fafafa; font-family: Arial, sans-serif; overflow: hidden; }
  .container { width: 700px; height: 400px; position: relative; }
  .title { font-size: 18px; font-weight: bold; color: #1a1a1a; text-align: center; padding-top: 18px; }
  .subtitle { font-size: 12px; color: #888; text-align: center; margin-top: 4px; }
  .chart-area { position: absolute; top: 70px; left: 70px; width: 580px; height: 260px; }
  .grid-line { stroke: #e5e7eb; stroke-width: 1; }
  .axis-label { font-size: 11px; fill: #888; font-family: Arial, sans-serif; }
  .year-label { font-size: 11px; fill: #888; font-family: Arial, sans-serif; text-anchor: middle; }
  .pg-line { fill: none; stroke: #336791; stroke-width: 3; }
  .mysql-line { fill: none; stroke: #E48E00; stroke-width: 3; }
  .pg-area { fill: url(#pgGrad); opacity: 0.15; }
  .mysql-area { fill: url(#mysqlGrad); opacity: 0.1; }
  .legend { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 32px; font-size: 13px; color: #444; }
  .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .callout { position: absolute; font-size: 11px; color: #336791; font-weight: 600; background: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #336791; white-space: nowrap; }
  .callout-mysql { color: #b87800; border-color: #E48E00; }
</style>
</head>
<body>
<div class="container">
  <div class="title">DB-Engines Popularity: PostgreSQL vs MySQL (2013–2025)</div>
  <div class="subtitle">Score based on search engine mentions, job postings, technical discussions, and social media</div>

  <svg class="chart-area" viewBox="0 0 580 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="pgGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#336791"/>
        <stop offset="100%" stop-color="#336791" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="mysqlGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E48E00"/>
        <stop offset="100%" stop-color="#E48E00" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- Grid lines (horizontal) -->
    <line x1="0" y1="0" x2="580" y2="0" class="grid-line"/>
    <line x1="0" y1="52" x2="580" y2="52" class="grid-line"/>
    <line x1="0" y1="104" x2="580" y2="104" class="grid-line"/>
    <line x1="0" y1="156" x2="580" y2="156" class="grid-line"/>
    <line x1="0" y1="208" x2="580" y2="208" class="grid-line"/>
    <line x1="0" y1="260" x2="580" y2="260" class="grid-line"/>

    <!-- Y-axis labels (scores) -->
    <text x="-8" y="5" text-anchor="end" class="axis-label">1500</text>
    <text x="-8" y="57" text-anchor="end" class="axis-label">1300</text>
    <text x="-8" y="109" text-anchor="end" class="axis-label">1100</text>
    <text x="-8" y="161" text-anchor="end" class="axis-label">900</text>
    <text x="-8" y="213" text-anchor="end" class="axis-label">700</text>
    <text x="-8" y="265" text-anchor="end" class="axis-label">500</text>

    <!-- X-axis labels (years) -->
    <text x="0" y="278" class="year-label">2013</text>
    <text x="48" y="278" class="year-label">2014</text>
    <text x="97" y="278" class="year-label">2015</text>
    <text x="145" y="278" class="year-label">2016</text>
    <text x="193" y="278" class="year-label">2017</text>
    <text x="242" y="278" class="year-label">2018</text>
    <text x="290" y="278" class="year-label">2019</text>
    <text x="338" y="278" class="year-label">2020</text>
    <text x="387" y="278" class="year-label">2021</text>
    <text x="435" y="278" class="year-label">2022</text>
    <text x="483" y="278" class="year-label">2023</text>
    <text x="532" y="278" class="year-label">2024</text>
    <text x="580" y="278" class="year-label">2025</text>

    <!-- MySQL line (declining from ~1450 to ~1050) -->
    <!-- Approximate DB-Engines scores: 2013:1450, 2014:1460, 2015:1430, 2016:1400, 2017:1350, 2018:1300, 2019:1270, 2020:1240, 2021:1220, 2022:1190, 2023:1140, 2024:1090, 2025:1050 -->
    <path class="mysql-area" d="M0,6.5 L48,5.2 L97,9.1 L145,13 L193,19.5 L242,26 L290,29.9 L338,33.8 L387,36.4 L435,40.3 L483,46.8 L532,53.3 L580,58.5 L580,260 L0,260 Z"/>
    <path class="mysql-line" d="M0,6.5 L48,5.2 L97,9.1 L145,13 L193,19.5 L242,26 L290,29.9 L338,33.8 L387,36.4 L435,40.3 L483,46.8 L532,53.3 L580,58.5"/>

    <!-- PostgreSQL line (rising from ~500 to ~700 to ~900+) -->
    <!-- Approximate: 2013:500, 2014:520, 2015:550, 2016:580, 2017:610, 2018:650, 2019:690, 2020:730, 2021:780, 2022:830, 2023:890, 2024:950, 2025:1000 -->
    <path class="pg-area" d="M0,260 L48,254.8 L97,247 L145,239.2 L193,231.4 L242,221 L290,210.6 L338,200.2 L387,187.2 L435,174.2 L483,158.6 L532,143 L580,130 L580,260 L0,260 Z"/>
    <path class="pg-line" d="M0,260 L48,254.8 L97,247 L145,239.2 L193,231.4 L242,221 L290,210.6 L338,200.2 L387,187.2 L435,174.2 L483,158.6 L532,143 L580,130"/>

    <!-- Dots at endpoints -->
    <circle cx="580" cy="58.5" r="4" fill="#E48E00"/>
    <circle cx="580" cy="130" r="4" fill="#336791"/>

    <!-- DBMS of the Year 2023 marker -->
    <line x1="483" y1="155" x2="483" y2="260" stroke="#336791" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </svg>

  <!-- Callout annotations -->
  <div class="callout" style="top: 176px; right: 30px;">PostgreSQL: ~680 ▲</div>
  <div class="callout callout-mysql" style="top: 112px; right: 30px;">MySQL: ~1050 ▼</div>
  <div class="callout" style="top: 290px; left: 510px; font-size: 10px; color: #336791; border-style: dashed;">DBMS of Year 2023</div>

  <div class="legend">
    <span><span class="legend-dot" style="background: #336791;"></span>PostgreSQL</span>
    <span><span class="legend-dot" style="background: #E48E00;"></span>MySQL</span>
  </div>
</div>
</body>
</html>
